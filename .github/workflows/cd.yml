name: CD (Publish to npm)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - none
      preid:
        description: "Pre-release id (e.g. beta, rc). Leave blank for stable"
        required: false
        type: string

permissions:
  actions: read
  contents: write
  pull-requests: write
  id-token: write # for npm provenance (requires Node 18+ and npm >=9)
  attestations: write

env:
  FALLBACK_RUNNER_LABEL: ubuntu-latest
  SELF_HOSTED_RUNNER_LABELS: '["self-hosted","Linux","X64"]'

jobs:
  prepare_release:
    uses: ./.github/workflows/release-prepare.yml
    with:
      bump: ${{ inputs.bump }}
      preid: ${{ inputs.preid }}
    secrets: inherit

  select-runner:
    name: Select runner
    runs-on: ubuntu-latest
    outputs:
      runner_labels: ${{ steps.select.outputs.runner_labels }}
    steps:
      - name: Prefer idle self-hosted runner
        id: select
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.RUNNER_SELECTOR_TOKEN || github.token }}
          script: |
            const selfHostedLabels = JSON.parse(process.env.SELF_HOSTED_RUNNER_LABELS)
            const fallbackRunner = process.env.FALLBACK_RUNNER_LABEL
            let selectedRunnerJson = JSON.stringify(fallbackRunner)

            try {
              const runners = await github.paginate(
                github.rest.actions.listSelfHostedRunnersForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                }
              )

              const hasMatchingIdleRunner = runners.some((runner) => {
                const labels = new Set((runner.labels || []).map((label) => label.name))
                return (
                  runner.status === "online" &&
                  runner.busy === false &&
                  selfHostedLabels.every((label) => labels.has(label))
                )
              })

              if (hasMatchingIdleRunner) {
                selectedRunnerJson = JSON.stringify(selfHostedLabels)
                core.info(`Selected self-hosted runner labels ${selfHostedLabels.join(", ")}.`)
              } else {
                core.info(
                  `No idle self-hosted runner with labels ${selfHostedLabels.join(", ")} was found; falling back to ${fallbackRunner}.`
                )
              }
            } catch (error) {
              core.warning(
                `Could not inspect self-hosted runners; falling back to ${fallbackRunner}. ${error.message}`
              )
            }

            core.setOutput("runner_labels", selectedRunnerJson)

  publish:
    needs:
      - select-runner
      - prepare_release
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner_labels) }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Use prepared release metadata
        id: pkg
        run: |
          {
            echo "mode=publish"
            echo "name=${{ needs.prepare_release.outputs.name }}"
            echo "tag=${{ needs.prepare_release.outputs.tag }}"
            echo "version=${{ needs.prepare_release.outputs.version }}"
            echo "flags=${{ needs.prepare_release.outputs.flags }}"
            echo "published=${{ needs.prepare_release.outputs.published }}"
          } >> "$GITHUB_OUTPUT"
      - name: Install deps (CI)
        run: npm install --no-fund --no-audit

      - name: Test (coverage)
        run: npm run test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
         token: ${{ secrets.CODECOV_TOKEN }}
         files: ./coverage/lcov.info
         flags: unittests
         fail_ci_if_error: true

      - name: Build
        run: npm run build --if-present

      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format=cyclonedx --sbom-type=library --omit dev > sbom.cdx.json

      - name: Attest SBOM (GitHub Artifact Attestations)
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: sbom.cdx.json

      - name: Create release tag from main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.pkg.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git checkout -B main origin/main

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            if gh release view "${TAG}" >/dev/null 2>&1; then
              IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
              if [ "${IS_DRAFT}" != "true" ]; then
                echo "Published release ${TAG} already exists; reusing the existing tag."
                exit 0
              fi
            fi

            echo "Deleting stale unpublished tag ${TAG} before recreating it from main."
            git push origin ":refs/tags/${TAG}"
          fi

          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release draft (immutable-safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.pkg.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release $TAG already exists and is published. Immutable releases cannot be modified after publication; cut a new version instead."
              exit 1
            fi

            echo "Draft release $TAG already exists; refreshing mutable assets."
            if [ -f sbom.cdx.json ]; then
              gh release upload "$TAG" sbom.cdx.json --clobber
            else
              echo "No SBOM generated; leaving existing draft assets unchanged."
            fi
          else
            if [ -f sbom.cdx.json ]; then
              gh release create "$TAG" sbom.cdx.json                 --title "Release $TAG"                 --generate-notes                 --verify-tag                 --draft
            else
              gh release create "$TAG"                 --title "Release $TAG"                 --generate-notes                 --verify-tag                 --draft
            fi
          fi

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish ${{ steps.pkg.outputs.flags }} --provenance

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.pkg.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Expected draft release $TAG to exist before publication."
            exit 1
          fi

          IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "$TAG" --draft=false --latest
          else
            echo "Release $TAG is already published; skipping publication."
          fi
